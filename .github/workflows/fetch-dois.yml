name: Fetch Rogue Scholar DOIs

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'  # also re-check daily at 6am UTC
  workflow_dispatch:

jobs:
  fetch-dois:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch DOIs from Rogue Scholar
        run: |
          python3 << 'EOF'
          import os, re, urllib.request, urllib.parse, json, time

          posts_dir = '_posts'
          data_dir  = '_data'
          out_file  = os.path.join(data_dir, 'dois.yml')
          os.makedirs(data_dir, exist_ok=True)

          # Load existing data so we don't overwrite already-resolved DOIs
          existing = {}
          if os.path.exists(out_file):
              import yaml
              with open(out_file) as f:
                  existing = yaml.safe_load(f) or {}

          title_re = re.compile(r'^title\s*:\s*["\']?(.+?)["\']?\s*$', re.MULTILINE)
          results  = dict(existing)

          for fname in sorted(os.listdir(posts_dir)):
              if not (fname.endswith('.md') or fname.endswith('.markdown')):
                  continue
              slug = re.sub(r'^\d{4}-\d{2}-\d{2}-', '', fname).rsplit('.', 1)[0]

              # Skip if we already have a DOI for this post
              if slug in results and results[slug].get('doi'):
                  print(f'  {slug}: already resolved, skipping')
                  continue

              with open(os.path.join(posts_dir, fname)) as f:
                  content = f.read()
              m = title_re.search(content)
              if not m:
                  continue
              title = m.group(1).strip()

              q   = urllib.parse.quote(title)
              url = f'https://rogue-scholar.org/api/communities/chrismarcum/records?size=1&q={q}'
              print(f'  {slug}: querying for "{title}"')

              try:
                  req  = urllib.request.Request(url, headers={'User-Agent': 'jekyll-doi-fetcher/1.0'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.load(r)
                  hits = data.get('hits', {}).get('hits', [])
                  if hits:
                      rec = hits[0]
                      doi = (rec.get('pids', {}).get('doi', {}).get('identifier')
                             or rec.get('doi'))
                      rs_title = rec.get('metadata', {}).get('title', title)
                      results[slug] = {'doi': doi, 'title': rs_title}
                      print(f'    -> DOI: {doi}')
                  else:
                      results[slug] = {'doi': None, 'title': title}
                      print(f'    -> not yet indexed')
              except Exception as e:
                  print(f'    -> error: {e}')
              time.sleep(0.5)  # be polite to the API

          with open(out_file, 'w') as f:
              f.write('# Auto-generated by fetch-dois workflow. Do not edit manually.\n')
              for slug, rec in sorted(results.items()):
                  f.write(f'{slug}:\n')
                  f.write(f'  doi: {rec["doi"] or ""}\n')
                  f.write(f'  title: "{rec["title"]}"\n')

          print(f'\nWrote {len(results)} entries to {out_file}')
          EOF

      - name: Commit updated dois.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/dois.yml
          git diff --staged --quiet || git commit -m "chore: update Rogue Scholar DOIs [skip ci]"
          git push
